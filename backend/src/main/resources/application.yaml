spring:
  config:
    import: optional:file:.env.local[.properties]
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:15432/clubflow}
    username: ${DB_USERNAME:clubflow_user}
    password: ${DB_PASSWORD:clubflow_pass}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email

server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  google-data:
    client-id: ${GOOGLE_DATA_CLIENT_ID:}
    client-secret: ${GOOGLE_DATA_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_DATA_REDIRECT_URI:http://localhost:8080/api/google-data/oauth/callback}
    encryption-key: ${GOOGLE_TOKEN_ENCRYPTION_KEY:}
  mail:
    enabled: ${MAIL_ENABLED:false}
    api-base: ${RESEND_API_BASE:https://api.resend.com}
    api-key: ${RESEND_API_KEY:}
    from: ${MAIL_FROM:}

springdoc:
  paths-to-match: /api/**
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
